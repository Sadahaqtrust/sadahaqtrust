<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Rohtak — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F47216; color: white; display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 24px; }
    .container { max-width: 400px; }
    .icon { font-size: 80px; margin-bottom: 24px; }
    h1 { font-size: 28px; margin-bottom: 8px; }
    p { font-size: 16px; opacity: 0.9; margin-bottom: 24px; }
    button { background: #00A650; color: white; border: none; padding: 14px 32px; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; }
    button:hover { background: white; color: #00A650; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p>Check your internet connection and try again</p>
    <button onclick="window.location.reload()">Retry</button>
  </div>
</body>
</html>
